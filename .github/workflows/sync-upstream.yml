name: Sync upstream

# upstream (u-ichi/compact-plus) の更新を定期的に取り込む。
# フォーク側の独自変更はこのワークフローのみなので、通常はマージして
# そのまま push し、コンフリクト時のみ解消用 PR を作成する。

on:
  schedule:
    - cron: "0 21 * * *" # 毎日 06:00 JST
  workflow_dispatch:

concurrency: ${{ github.workflow }}

jobs:
  sync:
    # フォーク側でのみ動かす（upstream 本体では不要）
    if: github.repository != 'u-ichi/compact-plus'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Git ユーザー設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: upstream を取得
        id: fetch
        run: |
          git remote add upstream https://github.com/u-ichi/compact-plus.git
          git fetch upstream main
          echo "behind=$(git rev-list --count HEAD..upstream/main)" >> "$GITHUB_OUTPUT"

      - name: upstream をマージして push
        id: merge
        if: steps.fetch.outputs.behind != '0'
        run: |
          if git merge --no-edit upstream/main; then
            git push origin main
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: コンフリクト時は解消用 PR を作成
        if: steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git checkout -B sync/upstream upstream/main
          git push -f origin sync/upstream
          if [ -z "$(gh pr list --head sync/upstream --state open --json number --jq '.[].number')" ]; then
            gh pr create --base main --head sync/upstream \
              --title "chore: sync with upstream（コンフリクト解消が必要）" \
              --body "upstream (u-ichi/compact-plus) の自動マージでコンフリクトが発生しました。手元で解消して main に取り込んでください。"
          fi
