name: Sync upstream

# upstream (u-ichi/compact-plus) の更新を定期的に取り込む。
# GITHUB_TOKEN には workflows 権限がなく、upstream 側の
# .github/workflows/* 変更を git push で取り込めないため、
# サーバーサイドでマージされる fork sync API (merge-upstream) を使う。
# API が失敗した場合（コンフリクト等）は push 不要の
# クロスリポジトリ PR (u-ichi:main -> main) を作成する。

on:
  schedule:
    - cron: "0 21 * * *" # 毎日 06:00 JST
  workflow_dispatch:

concurrency: ${{ github.workflow }}

jobs:
  sync:
    # フォーク側でのみ動かす（upstream 本体では不要）
    if: github.repository != 'u-ichi/compact-plus'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: upstream をマージ（fork sync API）
        id: merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if resp=$(gh api -X POST "repos/${{ github.repository }}/merge-upstream" -f branch=main 2>&1); then
            echo "$resp"
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "$resp"
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 失敗時は解消用 PR を作成
        if: steps.merge.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open=$(gh api "repos/${{ github.repository }}/pulls?head=u-ichi:main&state=open" --jq length)
          if [ "$open" = "0" ]; then
            gh api -X POST "repos/${{ github.repository }}/pulls" \
              -f title="chore: sync with upstream（手動マージが必要）" \
              -f head="u-ichi:main" \
              -f base="main" \
              -f body="upstream (u-ichi/compact-plus) の自動取り込み (merge-upstream API) が失敗しました。コンフリクト解消のうえ、この PR をマージしてください。"
          fi
