name: Sync upstream

# upstream (u-ichi/compact-plus) の更新を定期的に取り込む。
# サーバーサイドでマージされる fork sync API (merge-upstream) を使い、
# 失敗した場合（コンフリクト、または GITHUB_TOKEN に workflows 権限が
# なく upstream の .github/workflows/* 変更を取り込めない場合）は
# push 不要のクロスリポジトリ PR (u-ichi:main -> main) を作成する。
# リポジトリシークレット SYNC_TOKEN（contents+workflows write の
# fine-grained PAT）を登録すると、workflows 変更込みで完全自動になる。

on:
  schedule:
    - cron: "0 21 * * *" # 毎日 06:00 JST
  workflow_dispatch:

concurrency: ${{ github.workflow }}

jobs:
  sync:
    # フォーク側でのみ動かす（upstream 本体では不要）
    if: github.repository != 'u-ichi/compact-plus'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: upstream をマージ（fork sync API）
        id: merge
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN || github.token }}
        run: |
          if resp=$(gh api -X POST "repos/${{ github.repository }}/merge-upstream" -f branch=main 2>&1); then
            echo "$resp"
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "$resp"
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 失敗時は解消用 PR を作成
        if: steps.merge.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open=$(gh api "repos/${{ github.repository }}/pulls?head=u-ichi:main&state=open" --jq length)
          if [ "$open" = "0" ]; then
            gh api -X POST "repos/${{ github.repository }}/pulls" \
              -f title="chore: sync with upstream（手動マージが必要）" \
              -f head="u-ichi:main" \
              -f base="main" \
              -F maintainer_can_modify=false \
              -f body="upstream (u-ichi/compact-plus) の自動取り込み (merge-upstream API) が失敗しました。ワークフローファイルの変更またはコンフリクトが原因です。内容を確認のうえ、この PR をマージしてください。"
          fi
